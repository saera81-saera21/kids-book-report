<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아동도서 시장 리포트 (2000-2025)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; scroll-behavior: smooth; font-size: 1.1rem; }
        .gradient-text { background: linear-gradient(90deg, #3b82f6, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 leading-relaxed">
    <nav class="fixed w-full bg-white/90 backdrop-blur-md shadow-sm z-50">
        <div class="max-w-6xl mx-auto px-6 h-20 flex items-center justify-between">
            <h1 class="font-bold text-2xl gradient-text">KidsBook Insights</h1>
            <div class="hidden md:flex space-x-8 text-lg font-medium">
                <a href="#history" class="hover:text-blue-600">시장흐름</a>
                <a href="#analysis" class="hover:text-blue-600">변화분석</a>
                <a href="#future" class="hover:text-blue-600">미래전망</a>
            </div>
        </div>
    </nav>

    <header class="pt-40 pb-24 px-6 text-center">
        <div class="max-w-4xl mx-auto">
            <span class="px-5 py-2 bg-blue-100 text-blue-700 rounded-full text-base font-semibold">2026 프로젝트 1팀 기획 리포트 </span>
            <h2 class="mt-8 text-5xl md:text-6xl font-bold leading-tight">2000년 이후 아동도서 시장 분석</h2>
            <p class="mt-8 text-xl md:text-2xl text-gray-600">필독서의 시대부터 AI 초개인화 도서까지 </p>
        </div>
    </header>

    <section id="analysis" class="py-24 bg-gray-50 px-6">
        <div class="max-w-6xl mx-auto text-center">
            <h3 class="text-4xl font-bold mb-20">핵심 지표 분석</h3>
            <div class="grid md:grid-cols-2 gap-10">
                <div class="bg-white p-10 rounded-3xl shadow-sm">
                    <div class="text-5xl font-bold text-blue-600 mb-6">75% <i class="fa-solid fa-arrow-up text-3xl"></i></div>
                    <p class="font-bold text-xl mb-3">평균 정가 상승 [cite: 5]</p>
                    <p class="text-gray-500 text-lg">8,100원 → 14,200원 [cite: 5]</p>
                </div>
                <div class="bg-white p-10 rounded-3xl shadow-sm">
                    <div class="text-5xl font-bold text-purple-600 mb-6">10y+</div>
                    <p class="font-bold text-xl mb-3">시리즈 지속성 확대 [cite: 5]</p>
                    <p class="text-gray-500 text-lg">마법천자문 등 장기 베스트셀러 [cite: 5]</p>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
